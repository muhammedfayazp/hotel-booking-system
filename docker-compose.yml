services:

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: hotel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=local
    networks:
      - hotel_net
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: hotel_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - hotel_net
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: hotel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hotel_booking
      MYSQL_USER: hotel_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - hotel_db_data:/var/lib/mysql
    networks:
      - hotel_net

  redis:
    image: redis:7-alpine
    container_name: hotel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - hotel_net

volumes:
  hotel_db_data:

networks:
  hotel_net:
    driver: bridge
